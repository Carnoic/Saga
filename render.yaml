services:
  - type: web
    name: saga
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: "0.0.0.0"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/app/data/saga.db
      - key: STORAGE_PATH
        value: /app/storage
    healthCheckPath: /health
